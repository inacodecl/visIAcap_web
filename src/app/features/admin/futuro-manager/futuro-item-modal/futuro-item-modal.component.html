<ion-header class="ion-no-border">
    <ion-toolbar class="glass-toolbar">
        <ion-title>{{ isEdit ? 'Editar ' : 'Nueva ' }}{{ getLabelSingular() }}</ion-title>
        <ion-buttons slot="end">
            <ion-button (click)="close()">
                <ion-icon slot="icon-only" name="close"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content class="ion-padding glass-modal-content">
    <form (ngSubmit)="save()" class="assistive-form">

        <!-- COMÚN: Título -->
        <div class="input-group">
            <label>Título</label>
            <div class="input-wrapper">
                <ion-icon name="text-outline"></ion-icon>
                <input type="text" [(ngModel)]="formData.titulo" name="titulo" placeholder="Ej: Nueva innovación..." required>
            </div>
        </div>

        <!-- ESPECÍFICO: Noticias -->
        <ng-container *ngIf="type === 'noticias'">
            <div class="input-group">
                <label>Resumen</label>
                <div class="input-wrapper">
                    <ion-icon name="document-text-outline"></ion-icon>
                    <textarea [(ngModel)]="formData.resumen" name="resumen" rows="3" placeholder="Resumen de la noticia..."></textarea>
                </div>
            </div>
            <div class="input-group">
                <label>Etiqueta</label>
                <div class="input-wrapper">
                    <ion-icon name="bookmark"></ion-icon>
                    <input type="text" [(ngModel)]="formData.etiqueta" name="etiqueta" placeholder="Ej: Destacado">
                </div>
            </div>
            <div class="input-group">
                <label>Imagen de Portada</label>
                
                <!-- Componente de subida de imagen -->
                <app-admin-image-upload 
                    *ngIf="!formData.imagen_url && !formData.imagen"
                    uploadFolder="noticias"
                    (imageUploaded)="onImageUploaded($event)">
                </app-admin-image-upload>

                <!-- Previsualización de la imagen cargada -->
                <div class="media-preview-container" *ngIf="formData.imagen_url || formData.imagen" style="position: relative; margin-top: 10px;">
                    <img [src]="formData.imagen_url || formData.imagen" alt="Portada de noticia" style="width: 100%; max-height: 200px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);" />
                    <ion-button fill="clear" color="danger" (click)="removeImage()" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); border-radius: 50%; width: 36px; height: 36px; --padding-start: 0; --padding-end: 0;">
                        <ion-icon name="trash" slot="icon-only" style="font-size: 18px;"></ion-icon>
                    </ion-button>
                </div>
            </div>
            <div class="input-group">
                <label>Fecha (Opcional)</label>
                <div class="input-wrapper">
                    <ion-icon name="calendar-clear-outline"></ion-icon>
                    <input type="date" [(ngModel)]="formData.fecha" name="fecha">
                </div>
            </div>
        </ng-container>

        <!-- ESPECÍFICO: Este Mes -->
        <ng-container *ngIf="type === 'este-mes'">
            <div class="input-group">
                <label>Descripción</label>
                <div class="input-wrapper">
                    <ion-icon name="document-text-outline"></ion-icon>
                    <textarea [(ngModel)]="formData.descripcion" name="descripcion" rows="3" placeholder="Detalles del evento..."></textarea>
                </div>
            </div>
            <div class="row-inputs">
                <div class="input-group half">
                    <label>Día</label>
                    <div class="input-wrapper">
                        <input type="text" [(ngModel)]="formData.dia" name="dia" maxlength="2" placeholder="Ej: 15">
                    </div>
                </div>
                <div class="input-group half">
                    <label>Mes</label>
                    <div class="input-wrapper">
                        <input type="text" [(ngModel)]="formData.mes" name="mes" maxlength="3" placeholder="Ej: FEB">
                    </div>
                </div>
            </div>
            <div class="input-group">
                <label>Tipo de Evento</label>
                <div class="input-wrapper">
                    <ion-icon name="list-outline"></ion-icon>
                    <input type="text" [(ngModel)]="formData.tipo" name="tipo_evento" placeholder="Ej: Charla, Taller...">
                </div>
            </div>
        </ng-container>


        <!-- COMÚN: Publicado y Orden -->
        <div class="row-inputs v-center">
            <ion-item lines="none" class="glass-item transparent">
                <ion-label>Publicado</ion-label>
                <ion-toggle slot="end" [(ngModel)]="formData.is_published" name="published"></ion-toggle>
            </ion-item>
            <div class="input-group half">
                <label>Prioridad / Orden</label>
                <input type="number" [(ngModel)]="formData.order_index" name="order" class="small-input" placeholder="0">
            </div>
        </div>

        <div class="form-actions">
            <ion-button type="submit" expand="block" shape="round" class="save-btn cyan">
                {{ isEdit ? 'Guardar Cambios' : 'Crear Entrada' }}
            </ion-button>
        </div>
    </form>
</ion-content>
