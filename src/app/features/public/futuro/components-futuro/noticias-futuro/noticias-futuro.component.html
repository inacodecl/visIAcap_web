<section class="stitch-section mb-extra">
    <div class="stitch-header">
        <span class="stitch-eyebrow">{{ 'FUTURO.NEWS_SUBTITLE' | translate }}</span>
        <h3 class="stitch-title">{{ 'FUTURO.NEWS_TITLE' | translate }}</h3>
    </div>

    <div class="stitch-news-grid">
        <!-- Noticia 1 (Izquierda, más grande) -->
        <div class="news-item item-main group" *ngIf="noticias[0]">
            <div class="img-wrapper ratio-video">
                <img [src]="noticias[0].imagen" [alt]="noticias[0].titulo">
            </div>
            <div class="news-content">
                <span class="news-meta">{{ noticias[0].fecha }}</span>
                <h4 class="news-title">{{ noticias[0].titulo }}</h4>
                <p class="news-desc">{{ noticias[0].resumen }}</p>
            </div>
        </div>

        <!-- Noticia 2 (Derecha, formato cuadrado, empujada hacia abajo) -->
        <div class="news-item item-side group" *ngIf="noticias[1]">
            <div class="img-wrapper ratio-square">
                <img [src]="noticias[1].imagen" [alt]="noticias[1].titulo">
            </div>
            <div class="news-content">
                <span class="news-meta">{{ noticias[1].fecha }}</span>
                <h4 class="news-title">{{ noticias[1].titulo }}</h4>
                <p class="news-desc">{{ noticias[1].resumen }}</p>
            </div>
        </div>
    </div>
</section>
