<section class="stitch-section mb-extra">
    <div class="stitch-header">
        <div class="header-content">
            <span class="stitch-eyebrow">{{ 'FUTURO.NEWS_SUBTITLE' | translate }}</span>
            <h3 class="stitch-title">{{ 'FUTURO.NEWS_TITLE' | translate }}</h3>
        </div>
    </div>

    <div class="carousel-container">
        <swiper-container slides-per-view="auto" space-between="20" free-mode="true" speed="2500" autoplay="true" autoplay-delay="3000" autoplay-disable-on-interaction="false" class="noticias-swiper">
            <swiper-slide class="news-slide" *ngFor="let noticia of noticias; let i = index">
                <div class="news-item" [ngClass]="i % 2 === 0 ? 'layout-normal' : 'layout-reverse'">
                    <div class="img-wrapper">
                        <img [src]="noticia.imagen" [alt]="noticia.titulo">
                    </div>
                    <div class="news-content">
                        <span class="news-meta">{{ noticia.fecha }}</span>
                        <h4 class="news-title">{{ noticia.titulo }}</h4>
                        <p class="news-desc">{{ noticia.resumen }}</p>
                    </div>
                </div>
            </swiper-slide>
        </swiper-container>
    </div>
</section>
