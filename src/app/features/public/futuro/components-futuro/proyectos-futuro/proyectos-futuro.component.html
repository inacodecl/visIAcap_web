<section class="gallery-section">
    <div class="gallery-section-header">
        <div class="gallery-icon-wrapper">
            <ion-icon name="bulb-outline"></ion-icon>
        </div>
        <div class="gallery-title-group">
            <h2 class="gallery-title">{{ 'FUTURO.PROJECTS_TITLE' | translate }}</h2>
            <p class="gallery-subtitle">{{ 'FUTURO.PROJECTS_SUBTITLE' | translate }}</p>
        </div>
        <div class="carousel-nav-btns">
            <button class="nav-btn" (click)="scrollProyectos('prev')" aria-label="Anterior">
                <ion-icon name="arrow-back-outline"></ion-icon>
            </button>
            <button class="nav-btn nav-btn--active" (click)="scrollProyectos('next')" aria-label="Siguiente">
                <ion-icon name="arrow-forward-outline"></ion-icon>
            </button>
        </div>
    </div>

    <div class="projects-gallery" #proyectosCarousel>
        <div class="gallery-card" 
             *ngFor="let proyecto of proyectos; let i = index" 
             [class.gallery-card--staggered]="i % 2 !== 0"
             [style.animation-delay]="(i * 100) + 'ms'">
            <div class="gallery-card-img" [style.backgroundImage]="'url(' + proyecto.imagen + ')'">
                <span class="gallery-badge">
                    <ion-icon [name]="proyecto.icono"></ion-icon>
                    {{ proyecto.categoria }}
                </span>
            </div>
            <div class="gallery-card-content">
                <h3>{{ proyecto.titulo }}</h3>
                <p>{{ proyecto.descripcion }}</p>
                <div class="gallery-action">
                    <span>{{ 'FUTURO.VIEW_PROJECT' | translate }}</span>
                    <ion-icon name="arrow-forward-outline"></ion-icon>
                </div>
            </div>
        </div>
    </div>
</section>
