<section class="stitch-section mb-extra">
    <!-- Header para Navegación del Carrusel (Consistente con Proyectos) -->
    <div class="gallery-section-header">
        <div class="gallery-icon-wrapper">
            <ion-icon name="rocket-outline"></ion-icon>
        </div>
        <div class="gallery-title-group">
            <h2 class="gallery-title">{{ 'FUTURO.COMING_SOON_TITLE' | translate }}</h2>
            <p class="gallery-subtitle">{{ 'FUTURO.COMING_SOON_SUBTITLE' | translate }}</p>
        </div>
        <div class="carousel-nav-btns">
            <button class="nav-btn" (click)="scrollProximamente('prev')" aria-label="Anterior">
                <ion-icon name="arrow-back-outline"></ion-icon>
            </button>
            <button class="nav-btn nav-btn--active" (click)="scrollProximamente('next')" aria-label="Siguiente">
                <ion-icon name="arrow-forward-outline"></ion-icon>
            </button>
        </div>
    </div>

    <!-- Carrusel Estilo Innovation Fair -->
    <div class="upcoming-carousel" #proximamenteCarousel>
        <div class="stitch-upcoming-card" 
             *ngFor="let evento of proximamente; let i = index"
             [style.animation-delay]="(i * 100) + 'ms'">
            
            <!-- Imagen con gradiente al fondo a la derecha -->
            <div class="stitch-card-bg">
                <img [src]="evento.imagen" [alt]="evento.titulo">
                <div class="bg-gradient-overlay"></div>
            </div>

            <!-- Contenido Frontal -->
            <div class="stitch-card-content">
                <span class="reserved-dates">{{ 'FUTURO.IN_PREPARATION' | translate }}</span>
                <h3 class="upcoming-huge-title">{{ evento.titulo }}</h3>
                
                <p class="upcoming-subtitle-desc">{{ evento.descripcion }}</p>

                <div class="upcoming-meta-flex">
                    <div class="meta-block">
                        <div class="icon-circle">
                            <ion-icon name="calendar-number-outline"></ion-icon>
                        </div>
                        <div class="meta-texts">
                            <span class="meta-label">FECHA</span>
                            <span class="meta-value">{{ evento.fechaTexto }}</span>
                        </div>
                    </div>
                    <div class="meta-block">
                        <div class="icon-circle">
                            <ion-icon name="map-outline"></ion-icon>
                        </div>
                        <div class="meta-texts">
                            <span class="meta-label">LUGAR</span>
                            <span class="meta-value">{{ evento.ubicacion }}</span>
                        </div>
                    </div>
                </div>

                <button class="notify-btn-pill">
                    {{ 'FUTURO.NOTIFY_ME' | translate }}
                </button>
            </div>
        </div>
    </div>
</section>
