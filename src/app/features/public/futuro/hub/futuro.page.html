<ion-content [fullscreen]="true" class="futuro-v2-content">
    
    <!-- MANTENIDO: Header con Logo INACAP y "Futuro Renca" -->
    <header class="v2-header">
        <div class="header-left">
            <button class="back-btn" (click)="volverHome()" aria-label="Volver">
                <ion-icon name="arrow-back-outline"></ion-icon>
            </button>
            <div class="logo-container">
                <img src="assets/icon/logo-inacap-60-v2.png" alt="INACAP 60 Años" class="logo-img">
            </div>
        </div>
        <div class="header-separator"></div>
        <div class="sede-container">
            <span class="sede-line">{{ 'FUTURO.TITLE' | translate }}</span>
            <span class="renca-line">{{ 'HOME.RENCA' | translate }}</span>
        </div>
    </header>

    <!-- Contenido Principal Tótem Digital Gallery -->
    <main class="main-container">

        <!-- Componentes Modulares -->
        
        <app-proyectos-futuro [proyectos]="proyectos()"></app-proyectos-futuro>
        
        <app-noticias-futuro [noticias]="noticias()"></app-noticias-futuro>
        
        <app-proximamente-futuro [proximamente]="proximamente()"></app-proximamente-futuro>

    </main>

    <!-- Footer Universal -->
    <app-home-footer></app-home-footer>

</ion-content>
