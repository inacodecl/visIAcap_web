<ion-content [fullscreen]="true" class="entrevistas-content">

    <!-- Overlays Geométricos -->
    <app-geometric-overlay-top></app-geometric-overlay-top>

    <!-- Header con Logo INACAP -->
    <header class="v2-header">
        <div class="header-left">
            <button class="back-btn" (click)="goBack()" aria-label="Volver">
                <ion-icon name="arrow-back-outline"></ion-icon>
            </button>
            <div class="logo-container">
                <img src="assets/icon/logo-inacap-60-v2.png" alt="INACAP 60 Años" class="logo-img">
            </div>
        </div>
        <div class="header-separator"></div>
        <div class="sede-container">
            <span class="sede-line">PASADO</span>
            <span class="renca-line">RENCA</span>
        </div>
    </header>

    <!-- Contenido Principal Scrolleable -->
    <main class="main-container">

        <!-- ============================== -->
        <!-- HERO SECTION -->
        <!-- ============================== -->
        <section class="hero-section">
            <div class="hero-icon-wrapper">
                <ion-icon name="videocam-outline"></ion-icon>
            </div>
            <h1 class="hero-title"><span class="highlight">Entrevistas</span></h1>
            <p class="hero-subtitle">Memorias, anécdotas e historias de quienes construyeron la sede a lo largo de los años.</p>
        </section>

        <!-- Loading State (Skeleton) -->
        <div class="cards-container" *ngIf="isLoading()">
            <div class="entrevistas-grid">
                <div class="entrevista-card skeleton-card" *ngFor="let item of [1,2,3,4,5,6]">
                    <div class="image-skeleton">
                        <ion-skeleton-text animated style="width: 100%; height: 100%"></ion-skeleton-text>
                    </div>
                    <div class="entrevista-info">
                        <ion-skeleton-text animated style="width: 50%"></ion-skeleton-text>
                        <ion-skeleton-text animated style="width: 80%; height: 20px; margin-top: 8px;"></ion-skeleton-text>
                        <ion-skeleton-text animated style="width: 100%; margin-top: 15px;"></ion-skeleton-text>
                        <ion-skeleton-text animated style="width: 60%"></ion-skeleton-text>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error State -->
        <div class="error-container" *ngIf="error() && !isLoading()">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <p>{{ error() }}</p>
            <ion-button fill="outline" color="light" (click)="loadEntrevistas()">Reintentar</ion-button>
        </div>

        <!-- Content State -->
        <div class="cards-container" *ngIf="!isLoading() && !error()">
            <div class="entrevistas-grid">
                
                <div #cardElement class="entrevista-card scroll-hidden" 
                     *ngFor="let entrevista of entrevistas(); let i = index"
                     [style.--i]="i"
                     (click)="openVideo(entrevista.url_video)">

                    <div class="entrevista-img" [style.backgroundImage]="'url(' + entrevista.url_imagen + ')'">
                        <div class="play-overlay">
                            <div class="play-circle">
                                <ion-icon name="play-circle-outline"></ion-icon>
                            </div>
                        </div>
                    </div>
                    
                    <div class="entrevista-info">
                        <span class="entrevista-sub">{{ entrevista.entrevistado }}</span>
                        <h3>{{ entrevista.titulo }}</h3>
                        <p>{{ entrevista.descripcion }}</p>
                        <div class="entrevista-action">
                            <span>Ver Video</span>
                            <ion-icon name="arrow-forward-outline"></ion-icon>
                        </div>
                    </div>

                </div>

            </div>

            <!-- Empty State -->
            <div class="empty-state" *ngIf="entrevistas().length === 0">
                <ion-icon name="film-outline"></ion-icon>
                <p>No hay entrevistas disponibles por el momento.</p>
            </div>
        </div>

    </main>

    <!-- Footer Component -->
    <app-home-footer></app-home-footer>

    <!-- Video Modal -->
    <ion-modal [isOpen]="isVideoModalOpen()" (didDismiss)="closeVideo()" class="custom-video-modal">
        <ng-template>
            <div class="video-modal-content">
                <button class="close-video-btn" (click)="closeVideo()">
                    <ion-icon name="close-circle-outline"></ion-icon>
                </button>
                <div class="iframe-container" *ngIf="currentVideoUrl()">
                    <iframe 
                        [src]="currentVideoUrl()" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </ng-template>
    </ion-modal>

</ion-content>
