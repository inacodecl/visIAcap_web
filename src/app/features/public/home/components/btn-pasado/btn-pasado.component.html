<button class="glass-btn btn-clock" [class.expanded]="isExpanded">
    <div class="ripple-container" #rippleContainer></div>
    
    <div class="icon-container">

        <!-- SVG Reloj de Arena Line-Art (Palitos) -->
        <svg viewBox="0 0 28 28" class="loader">
            <g class="hourglass-rotate">
                <!-- Bases (Gris) -->
                <path d="M 5 3 h 18" stroke="#888888" stroke-width="1.5" stroke-linecap="round" fill="none" />
                <path d="M 5 25 h 18" stroke="#888888" stroke-width="1.5" stroke-linecap="round" fill="none" />
                
                <!-- Cristal (Gris) -->
                <path d="M 7 3 V 6 C 7 10 11 12 13 14 C 11 16 7 18 7 22 V 25" stroke="#888888" stroke-width="1.5" fill="none" stroke-linejoin="round" />
                <path d="M 21 3 V 6 C 21 10 17 12 15 14 C 17 16 21 18 21 22 V 25" stroke="#888888" stroke-width="1.5" fill="none" stroke-linejoin="round" />
                
                <!-- Detalles internos de arena (Mostaza Brillante) -->
                
                <!-- Montaña de arena abajo (al girar quedará arriba y se vaciará) -->
                <path class="sand-fill" d="M 10.5 21 L 14 16 L 17.5 21 V 23 H 10.5 Z" fill="#F4C242" />
                
                <!-- Montaña de arena arriba (al girar quedará abajo y se llenará) -->
                <path class="sand-top" d="M 8.5 7 H 19.5 L 14 12 Z" fill="#F4C242" />
                
                <!-- Arena cayendo (línea desde el cuello hasta la base) -->
                <path class="sand-drop" d="M 14 14 V 7" stroke="#F4C242" stroke-width="1.5" stroke-linecap="round" fill="none" />
            </g>
        </svg>
    </div>

    <!-- Texto expandible -->
    <div class="text-container">
        <span class="title">{{ 'HOME.BUTTONS.PASADO.TITLE' | translate }}</span>
        <span class="subtitle">{{ 'HOME.BUTTONS.PASADO.SUBTITLE' | translate }}</span>
    </div>
</button>
