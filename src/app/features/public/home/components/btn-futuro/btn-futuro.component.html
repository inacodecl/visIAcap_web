<button class="glass-btn btn-rocket" [class.expanded]="isExpanded">
    <div class="ripple-container" #rippleContainer></div>
    
    <div class="icon-container">
        <!-- CIELO ESPACIAL EN HIPERVELOCIDAD -->
        <div class="space-bg">
            <div class="star-fast" style="left: 20%; animation-delay: 0s;"></div>
            <div class="star-fast" style="left: 50%; animation-delay: 0.15s;"></div>
            <div class="star-fast" style="left: 80%; animation-delay: 0.05s;"></div>
            <div class="star-fast" style="left: 35%; animation-delay: 0.2s;"></div>
            <div class="star-fast" style="left: 65%; animation-delay: 0.1s;"></div>
        </div>

        <svg viewBox="0 0 24 24">
            <g class="rocket-group" transform="rotate(45, 12, 12)">
                <!-- Fuego del propulsor -->
                <path class="rocket-flame" style="opacity:0" d="M 10 21.5 V 24 M 12 22 V 25 M 14 21.5 V 24" stroke-linecap="round" />
                
                <!-- Chasis -->
                <path d="M 4 20 L 8.5 12 V 7 C 8.5 2 10.5 -1.5 12 -1.5 C 13.5 -1.5 15.5 2 15.5 7 V 12 L 20 20 H 15.5 V 18 H 8.5 V 20 Z" stroke-linejoin="round" />
                
                <!-- Motores / Toberas en la base -->
                <path d="M 10 18 V 20.5 M 12 18 V 21 M 14 18 V 20.5" stroke-linecap="round" />
                
                <!-- Ventana -->
                <circle cx="12" cy="5.5" r="1.8" />
            </g>
        </svg>
    </div>

    <!-- Texto expandible -->
    <div class="text-container">
        <span class="title">FUTURO</span>
        <span class="subtitle">PROYECCIÓN</span>
    </div>
</button>
