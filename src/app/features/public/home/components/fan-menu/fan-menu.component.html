<!-- Feedback Visual de apertura -->
@if (activeApp()) {
  <div class="feedback-toast animate-slide-in">
    <div class="feedback-content">
      <div class="pulse-dot"></div>
      <div class="feedback-text">
        <p class="subtitle">Sede Renca Smart</p>
        <p class="title">Accediendo a {{ activeApp() }}</p>
      </div>
    </div>
  </div>
}

<!-- CONTENEDOR DEL MENÚ EN ABANICO REFINADO -->
<div class="fan-menu-container" [class.active]="isOpen()">
  
  <!-- Botón 1: INAGO (Naranja) -->
  <button class="menu-item item-inago shadow-xl" (click)="openApp('Inago')" aria-label="Inago">
    <img src="assets/icon/logo-InaGO.svg" class="w-12 h-12" style="object-fit: contain; filter: brightness(0) invert(1);" alt="InaGO" />
    <span class="label">INAGO</span>
  </button>
  
  <!-- Botón 2: ZENZ (Verde) -->
  <button class="menu-item item-zenz shadow-xl" (click)="openApp('Zenz')" aria-label="Zenz">
    <svg viewBox="0 0 24 24" class="w-12 h-12 fill-white"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72l5 2.73 5-2.73v3.72z"/></svg>
    <span class="label">ZENZ</span>
  </button>
  
  <!-- Botón 3: MIDAE (Azul) -->
  <button class="menu-item item-midae shadow-xl" (click)="openApp('MiDae')" aria-label="MiDae">
    <img src="assets/icon/logo-MiDae.svg" class="w-12 h-12" style="object-fit: contain; filter: brightness(0) invert(1);" alt="MiDae" />
    <span class="label">MIDAE</span>
  </button>

  <!-- Botón Central Principal (Inacap Rojo) -->
  <button class="main-trigger shadow-2xl" (click)="toggleMenu()">
    <div class="icon-wrapper" [class.is-open]="isOpen()">
      <img src="assets/icon/inacap-seeklogo 1.svg" style="width: 55px; height: 55px; object-fit: contain; filter: brightness(0) invert(1);" alt="INACAP" />
    </div>
    
    <div class="x-icon" [class.is-open]="isOpen()">
      <svg viewBox="0 0 24 24" class="w-12 h-12 fill-white"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </div>
  </button>

</div>
