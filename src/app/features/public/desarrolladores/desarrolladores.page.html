<ion-header class="ion-no-border" [translucent]="true">
  <ion-toolbar class="transparent-toolbar">
    <ion-buttons slot="start">
      <ion-button fill="clear" color="light" routerLink="/home" class="custom-back-btn">
        <ion-icon class="back-icon" name="arrow-back-outline" slot="start"></ion-icon>
        <span class="back-text">VOLVER</span>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="editorial-page">
  <!-- Mesh Gradient Background -->
  <div class="mesh-gradient-bg"></div>

  <main class="editorial-container">
    <header class="editorial-header bento-stagger" style="animation-delay: 0.1s;">
      <div class="subtitle-wrapper">
        <div class="line-decorator"></div>
        <span class="subtitle-text">DEVs</span>
      </div>
      <h1 class="main-title">
        LOS DESARROLLADORES<br/>
        <span class="gradient-text">DE VISIACAP</span>
      </h1>
    </header>

    <div class="bento-grid">
      <!-- Developer Cards Loop -->
      <section *ngFor="let dev of developers; let i = index" 
               class="dev-card bg-low bento-stagger" 
               [class.active]="i === selectedIndex"
               (click)="selectCard(i)"
               [style.animation-delay]="(0.2 + (i * 0.1)) + 's'">
        
        <div class="card-image-wrapper aspect-vertical">
          <img [src]="dev.image" [alt]="dev.name">
        </div>
        
        <div class="card-content slim-content">
          <span class="dev-role">{{ dev.role }}</span>
          <h2 class="dev-name">{{ dev.name }}</h2>
        </div>
      </section>
    </div>

    <!-- Extravagant Extension Box (Bio & Badges) con Angular Animations -->
    <div class="dev-extension-container">
      <ng-container *ngFor="let dev of developers; let i = index">
        <div *ngIf="i === visibleIndex" 
             @extensionAnim 
             class="dev-extension-box">
          <div class="extension-inner">
            <h3 class="extension-title">DESCRIPCIÓN</h3>
            <p class="dev-bio">
              {{ dev.bio }}
            </p>
            <div class="dev-badges">
              <span *ngFor="let badge of dev.badges" class="badge">
                <ion-icon [name]="badge.icon"></ion-icon>
                {{ badge.name }}
              </span>
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </main>

  <app-home-footer></app-home-footer>
</ion-content>
