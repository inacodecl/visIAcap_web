<div class="theme-popover-container">
  
  <!-- Botón Cerrar (Arriba Derecha) -->
  <ion-button class="btn-close-top" fill="clear" color="medium" (click)="cancel()">
    <ion-icon slot="icon-only" name="close-outline"></ion-icon>
  </ion-button>

  <h3 class="popover-title">Tema Visual</h3>
  <fieldset class="theme-selector">
    <div class="radio-group">
      <!-- Light Theme Option -->
      <label class="theme-option">
        <input
          type="radio"
          name="theme"
          value="light"
          [checked]="currentTheme === 'light'"
          (change)="onThemeSelect($event)"
          class="radio-input"
        />
        <div class="theme-box light-theme"></div>
        <span class="option-label">
          <svg class="icon check-icon" viewBox="0 0 24 24">
            <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" fill="none"></path>
          </svg>
          <svg class="icon minus-icon" viewBox="0 0 24 24">
            <path d="M5 12h14" stroke="currentColor" stroke-width="2" fill="none"></path>
          </svg>
          <span class="label-text">Claro</span>
        </span>
      </label>

      <!-- Dark Theme Option -->
      <label class="theme-option">
        <input 
          type="radio" 
          name="theme" 
          value="dark" 
          [checked]="currentTheme === 'dark'"
          (change)="onThemeSelect($event)"
          class="radio-input" 
        />
        <div class="theme-box dark-theme"></div>
        <span class="option-label">
          <svg class="icon check-icon" viewBox="0 0 24 24">
            <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" fill="none"></path>
          </svg>
          <svg class="icon minus-icon" viewBox="0 0 24 24">
            <path d="M5 12h14" stroke="currentColor" stroke-width="2" fill="none"></path>
          </svg>
          <span class="label-text">Oscuro</span>
        </span>
      </label>
    </div>
  </fieldset>

  <!-- Botones de Acción -->
  <div class="action-buttons">
    <ion-button class="btn-confirm" fill="solid" color="success" (click)="confirm()">
      <ion-icon slot="icon-only" name="checkmark-outline"></ion-icon>
    </ion-button>
  </div>
</div>
